<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DIY AI Workshop — Flock 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 2vh 5vw;
  }
  h1 {
    color: #e6edf3; font-size: 4.5vw; font-weight: 700;
    text-align: center; letter-spacing: -0.02em;
  }
  .url-box {
    background: #161b22; border: 3px solid #58a6ff; border-radius: 12px;
    padding: 1.5vh 3vw; margin: 1.5vh auto; text-align: center; max-width: 600px;
  }
  .url-box .url {
    font-family: 'SF Mono', Menlo, Consolas, monospace;
    font-size: 3.5vw; color: #58a6ff;
  }
  .url-box .alt { color: #adbac7; font-size: 1.4vw; margin-top: 0.3vh; }
  .grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1.5vw;
    max-width: 1000px; margin: 1.5vh auto 0; width: 100%;
  }
  .card {
    background: #161b22; border: 1px solid #484f58; border-radius: 12px;
    padding: 2vh 2vw;
  }
  .card-num { font-size: 4vw; font-weight: 800; line-height: 1; margin-bottom: 0.3vh; }
  .card-title { font-size: 2.4vw; font-weight: 700; color: #e6edf3; margin-bottom: 0.3vh; }
  .card-desc { font-size: 1.5vw; color: #adbac7; line-height: 1.3; }
  .card:nth-child(1) { border-color: #768390; } .card:nth-child(1) .card-num { color: #768390; }
  .card:nth-child(2) { border-color: #3fb950; } .card:nth-child(2) .card-num { color: #3fb950; }
  .card:nth-child(3) { border-color: #58a6ff; } .card:nth-child(3) .card-num { color: #58a6ff; }
  .card:nth-child(4) { border-color: #e3b341; } .card:nth-child(4) .card-num { color: #e3b341; }
  .kicker {
    text-align: center; font-size: 1.8vw; color: #adbac7;
    font-style: italic; margin-top: 1.5vh;
  }
</style>
</head>
<body>

<h1>DIY AI: Build a Private Chatbot</h1>

<div class="url-box">
  <div class="url" style="font-size:2.8vw;">lifto.github.io/lean</div>
  <div class="alt">or grab a USB drive from the front</div>
</div>

<div class="grid">
  <div class="card">
    <div class="card-num">0</div>
    <div class="card-title">Setup</div>
    <div class="card-desc">Get files from USB or server</div>
  </div>
  <div class="card">
    <div class="card-num">2</div>
    <div class="card-title">Voice</div>
    <div class="card-desc">Try speech input/output</div>
  </div>
  <div class="card">
    <div class="card-num">1</div>
    <div class="card-title">Chat</div>
    <div class="card-desc">Run a local LLM once</div>
  </div>
  <div class="card">
    <div class="card-num">3</div>
    <div class="card-title">Beyond</div>
    <div class="card-desc">Prompting, RAG, OpenCode, your own ideas</div>
  </div>
</div>

<div class="kicker">&ldquo;Wait. If I can run an LLM locally, then I could also&hellip;&rdquo;</div>

</body>
</html>
